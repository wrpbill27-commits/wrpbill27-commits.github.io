    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a2e1a, #0d3320);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #2ecc71;
        }
        .header h1 { font-size: 2em; color: #2ecc71; }
        .header .live-dot {
            display: inline-block; width: 10px; height: 10px;
            background: #e74c3c; border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        .header p { color: #7f8c8d; margin-top: 8px; font-size: 0.9em; }
        
        .section { margin: 20px 15px; }
        .section-title {
            background: #2ecc71;
            color: #000;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }
        .channel-btn {
            background: #1a2e1a;
            border: 1px solid #2ecc71;
            color: #fff;
            padding: 14px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            text-align: center;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
        }
        .channel-btn:hover {
            background: #2ecc71;
            color: #000;
            border-color: #2ecc71;
            transform: scale(1.03);
        }
        .channel-btn.featured {
            border: 2px solid #e74c3c;
            background: #1a0d0d;
        }
        .channel-btn.featured:hover {
            background: #e74c3c;
            border-color: #e74c3c;
        }
        
        .footnote {
            text-align: center;
            padding: 20px;
            color: #555;
            font-size: 0.75em;
            margin-top: 20px;
        }
        .footnote a { color: #2ecc71; }
        
        @media (max-width: 600px) {
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
            .channel-btn { font-size: 0.75em; padding: 10px 5px; }
            .header h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="live-dot"></span>ดูบอลสด ฟรี</h1>
        <p>Premier League · ไทยลีก · Champions League · ฟุตบอลโลก</p>
    </div>

    <!-- 🇹🇭 ฟุตบอลไทย -->

        <div class="section-title">🇹🇭 ฟุตบอลไทย / กีฬาไทย</div>
        <div class="channel-grid" id="thai-sports-grid"></div>
    </div>

    <!-- 🏴󠁧󠁢󠁥󠁮󠁧󠁿 พรีเมียร์ลีก -->
    <div class="section">
        <div class="section-title">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League / บอลยุโรป</div>
        <div class="channel-grid" id="epl-grid"></div>
    </div>

    <!-- 🌍 กีฬาอื่น -->
    <div class="section">
        <div class="section-title">🌍 ช่องกีฬาอื่น</div>
        <div class="channel-grid" id="other-sports-grid"></div>
    </div>

    <div class="footnote">
        ดูฟรี 24 ชม. · อัปเดตลิงก์ทุกวัน · 
        <a href="https://wrpbill27-commits.github.io/livetv/">📺 ทีวีทั่วไป</a>
    </div>

    <script>
        // Monetag SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
        (function(d,z,s){
            s.src='https://'+d+'/401/'+z;
            try{(document.body||document.documentElement).appendChild(s)}catch(e){}
        })('5gvci.com',11084399,document.createElement('script'));

        const PROXY = 'https://napalai.onrender.com/stream';

        // ── Curated football channels ──
        const THAI_SPORTS = [
            'hd-spotv2','hd-spotv','epl-3',
            'hd-tsport1','hd-tsport2','hd-tsport3','hd-tsport4',
            'sd-tsport5','sd-tsport7','sd-tsports',
        ];
        const EPL_SPORTS = [
            'epl-bein1','epl-bein2','epl-bein3',
            'uk-skysports-mainevent','uk-skysports-epl','uk-skysports-football',
            'uk-btsport1hd','uk-btsport2hd','uk-btsport3hd','uk-espn',
            'uk-mutv','uk-lfctv','uk-premiersports',
        ];
        const OTHER_SPORTS = [
            'uk-skysports-f1','us-nba','us-nbcgolf','hd-golf2',
            'hd-eurosport','uk-racing',
        ];

        function render(id, codes) {
            const grid = document.getElementById(id);
            const featured = ['hd-spotv2','epl-bein1','uk-skysports-main'];
            grid.innerHTML = codes.map(code => {
                const ch = channelMap[code];
                if (!ch) return '';
                const cls = featured.includes(code) ? 'channel-btn featured' : 'channel-btn';
                return `<a href="${PROXY}/${encodeURIComponent(ch.code)}" class="${cls}" target="_blank" rel="nofollow noopener">
                    ▶ ${ch.name}
                </a>`;
            }).join('');
        }

        let channelMap = {};

        fetch('channels.json')
            .then(r => r.json())
            .then(channels => {
                channelMap = {};
                channels.forEach(ch => { channelMap[ch.code] = ch; });
                render('thai-sports-grid', THAI_SPORTS);
                render('epl-grid', EPL_SPORTS);
                render('other-sports-grid', OTHER_SPORTS);
            });
    </script>
</body>
